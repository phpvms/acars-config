name: 'Build'
on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
jobs:
  artifacts:
    name: 'Create release'
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: install node
        uses: actions/setup-node@v3
        with:
          cache: 'npm'

      - name: build
        run: |
          npm install
          npm run build

        # Create a zip from what's in this repo
      - name: Archive Release
        uses: thedoctor0/zip-release@0.7.5
        with:
          type: 'zip'
          directory: './dist'
          path: '.'
          filename: '../stable.zip'
          exclusions: ''

        # List all the files that have been created
      - name: 'List files'
        run: |
          find dist/ -maxdepth 2  -type f

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: acars-package
          path: 'stable.zip'
          overwrite: true

  #
  # Now publish it up
  #
  publish:
    runs-on: ubuntu-latest
    needs: [ 'artifacts' ]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev' || startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: acars-package

      - uses: BetaHuhn/do-spaces-action@latest
        with:
          access_key: ${{ secrets.SPACE_ACCESS_KEY}}
          secret_key: ${{ secrets.SPACE_SECRET_KEY }}
          space_name: ${{ secrets.SPACE_NAME }}
          space_region: ${{ secrets.SPACE_REGION }}
          cdn_domain: ${{ secrets.SPACE_CDN_DOMAIN }}
          source: stable.zip
          out_dir: scripts

  #
  # Manually triggered: bump the version, tag it, and publish a GitHub release
  #
  release:
    name: 'Create GitHub release'
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: install node
        uses: actions/setup-node@v3
        with:
          cache: 'npm'

      - name: bump version
        id: bump
        run: |
          cd src
          npm version ${{ inputs.bump }} --no-git-tag-version
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: commit and tag
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git checkout -B "${{ github.ref_name }}"
          git add src/package.json
          git commit -m "chore: bump version to v${{ steps.bump.outputs.version }}"
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin "${{ github.ref_name }}"
          git push origin "v${{ steps.bump.outputs.version }}"

      - name: build
        run: |
          npm install
          npm run build

      - name: Archive Release
        uses: thedoctor0/zip-release@0.7.5
        with:
          type: 'zip'
          directory: './dist'
          path: '.'
          filename: '../stable.zip'
          exclusions: ''

      - uses: BetaHuhn/do-spaces-action@latest
        with:
          access_key: ${{ secrets.SPACE_ACCESS_KEY}}
          secret_key: ${{ secrets.SPACE_SECRET_KEY }}
          space_name: ${{ secrets.SPACE_NAME }}
          space_region: ${{ secrets.SPACE_REGION }}
          cdn_domain: ${{ secrets.SPACE_CDN_DOMAIN }}
          source: stable.zip
          out_dir: scripts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: 'v${{ steps.bump.outputs.version }}'
          generate_release_notes: true
          files: stable.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
